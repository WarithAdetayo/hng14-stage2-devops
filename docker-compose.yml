# ── Why no `version:` field? ──────────────────────────────────────────────────
# The Compose Specification (used by Docker Compose v2+) dropped the version
# key.  Omitting it avoids the deprecation warning and uses the modern spec.

networks:
  # A named internal network.  Services on this network reach each other by
  # service name.  Redis is NOT exposed on any host port — it is reachable
  # only from inside this network (api and worker).
  internal:
    driver: bridge

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    # Pass the password via the command so we never write it into the image or
    # hard-code it in the Compose file.  The value comes from the .env file /
    # environment at runtime.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - internal
    # No `ports:` block — Redis is deliberately not exposed on the host machine.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
    image: job-api:latest
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - internal
    # `condition: service_healthy` waits for the Redis health check to pass —
    # not just for the container to start.  This prevents connection-refused
    # errors during API startup.
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
    image: job-worker:latest
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import redis, os; r = redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379')), password=os.environ.get('REDIS_PASSWORD')); r.ping()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: job-frontend:latest
    environment:
      - API_URL=http://api:8000
      - PORT=3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
