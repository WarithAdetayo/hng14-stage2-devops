name: CI/CD Pipeline

# Run on every push and on PRs targeting main.
# The deploy job has an extra guard: `if: github.ref == 'refs/heads/main'`
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Least-privilege permissions.  The security-scan job needs write access
# to upload SARIF results to GitHub Code Scanning.
permissions:
  contents: read
  security-events: write

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1: LINT
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Stage 1 — Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python linting (flake8) ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Lint Python — api
        run: flake8 api/main.py api/tests/

      - name: Lint Python — worker
        run: flake8 worker/worker.py

      # ── JavaScript linting (eslint) ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (including eslint devDep)
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript — frontend
        working-directory: frontend
        run: npm run lint

      # ── Dockerfile linting (hadolint) ────────────────────────────────────
      - name: Lint api/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 2: TEST
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: "Stage 2 — Test"
    runs-on: ubuntu-latest
    needs: lint   # lint must pass before tests run

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API + test dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r api/requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: api
        run: |
          pytest tests/ \
            -v \
            --cov=main \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 3: BUILD
  # Builds all three images, pushes to a local registry service container,
  # then saves them as tar artifacts for use by later stages.
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: "Stage 3 — Build"
    runs-on: ubuntu-latest
    needs: test

    # The registry service container is available at localhost:5000 for the
    # entire duration of this job.  It is a local, ephemeral registry — no
    # credentials required, no external service dependency.
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      # Buildx is required to use the docker/build-push-action.
      # `network=host` lets the builder push to localhost:5000.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build & push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

      # Pull images back from the local registry and save as tarballs.
      # Later jobs download these artifacts so they don't need to rebuild.
      - name: Save images as tarballs
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest

          # Re-tag with the names docker-compose.yml expects
          docker tag localhost:5000/api:latest     job-api:latest
          docker tag localhost:5000/worker:latest  job-worker:latest
          docker tag localhost:5000/frontend:latest job-frontend:latest

          docker save job-api:latest      -o /tmp/api.tar
          docker save job-worker:latest   -o /tmp/worker.tar
          docker save job-frontend:latest -o /tmp/frontend.tar

      - name: Upload image tarballs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 4: SECURITY SCAN (Trivy)
  # Fails the pipeline on any CRITICAL severity finding that has a fix
  # available.  Results are uploaded both as a pipeline artifact and to GitHub
  # Code Scanning (visible under the Security tab).
  # ───────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "Stage 4 — Security Scan"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/api.tar
          docker load -i /tmp/worker.tar
          docker load -i /tmp/frontend.tar

      # ── Scan each image ──────────────────────────────────────────────────
      - name: Scan API image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "job-api:latest"
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan worker image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "job-worker:latest"
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "job-frontend:latest"
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # ── Upload results ───────────────────────────────────────────────────
      - name: Upload SARIF results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even when a scan found vulnerabilities
        with:
          sarif_file: "."   # uploads all *.sarif files in the workspace

      - name: Upload SARIF files as pipeline artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 5: INTEGRATION TEST
  # Brings the full stack up inside the runner, submits a job through the
  # frontend HTTP API, polls until the worker marks it completed, asserts the
  # final status, and tears down regardless of outcome.
  # ───────────────────────────────────────────────────────────────────────────
  integration-test:
    name: "Stage 5 — Integration Test"
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/api.tar
          docker load -i /tmp/worker.tar
          docker load -i /tmp/frontend.tar

      # Write a .env with test-only credentials.
      # These are NOT secrets — they are ephemeral and exist only inside the
      # runner for the duration of this job.
      - name: Create test .env
        run: |
          cat > .env <<'EOF'
          REDIS_PASSWORD=integration_test_pass_123
          FRONTEND_PORT=3000
          EOF

      # `--no-build` tells Compose to use the images we just loaded rather
      # than trying to rebuild them.
      - name: Start the full stack
        run: docker compose up --no-build -d

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to reach healthy state…"
          TIMEOUT=120
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            # Count containers that are either healthy or have no health check
            HEALTHY=$(docker compose ps --format json \
              | python3 -c "
          import sys, json
          data = sys.stdin.read().strip()
          # docker compose ps --format json outputs one JSON object per line
          containers = [json.loads(l) for l in data.splitlines() if l.strip()]
          ok = [c for c in containers
                if c.get('Health') in ('healthy', '') or c.get('State') == 'running']
          print(len(ok))
          ")
            TOTAL=$(docker compose ps -q | wc -l)
            echo "  Healthy/running: ${HEALTHY} / ${TOTAL}  (${ELAPSED}s)"
            if [ "$HEALTHY" -ge "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
              echo "All services ready!"
              break
            fi
            sleep 5
            ELAPSED=$(( ELAPSED + 5 ))
          done
          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "Services did not become healthy in time"
            docker compose logs
            exit 1
          fi

      - name: Submit a job via the frontend
        id: submit_job
        run: |
          echo "Submitting job…"
          RESPONSE=$(curl --silent --fail --retry 3 --retry-delay 2 \
            -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Poll job until completed (max 60 s)
        run: |
          JOB_ID="${{ steps.submit_job.outputs.job_id }}"
          TIMEOUT=60
          ELAPSED=0
          echo "Polling job $JOB_ID…"

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            STATUS=$(curl --silent --fail \
              "http://localhost:3000/status/$JOB_ID" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))")
            echo "  [${ELAPSED}s] status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "✓ Job completed successfully!"
              exit 0
            fi

            sleep 2
            ELAPSED=$(( ELAPSED + 2 ))
          done

          echo "✗ Job did not complete within ${TIMEOUT}s"
          docker compose logs
          exit 1

      # `if: always()` guarantees teardown even when the test steps fail.
      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 6: DEPLOY  (main branch only)
  # Performs a scripted rolling update on the production host via SSH.
  # The new container must pass its Docker health check within 60 s; if it
  # does not, the old container is left running and the job fails.
  #
  # Required repository secrets:
  #   DEPLOY_HOST     — hostname / IP of the production server
  #   DEPLOY_USER     — SSH user on that server
  #   DEPLOY_SSH_KEY  — private key (PEM) for the SSH user
  #   REGISTRY        — image registry prefix (e.g. ghcr.io/yourorg/yourrepo)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Stage 6 — Deploy"
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets are configured
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_HOST secret not set — skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy rolling-update script to host
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          scp scripts/rolling-update.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/rolling-update.sh"

      - name: Execute rolling update on host
        if: steps.check_secrets.outputs.configured == 'true'
        env:
          SHA: ${{ github.sha }}
          REGISTRY: ${{ secrets.REGISTRY }}
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "REGISTRY=$REGISTRY APP_DIR=/app bash /tmp/rolling-update.sh $SHA"
